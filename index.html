<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propiedades Collipulli | Venta y Arriendo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans flex flex-col min-h-screen">

  <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold tracking-tight">Propiedades Collipulli</h1>
      <a href="login.html" class="text-sm bg-blue-700 px-4 py-2 rounded-lg hover:bg-blue-600 transition font-semibold">
        Acceso Admin
      </a>
    </div>
  </nav>

  <div class="container mx-auto mt-4 p-2">
    <div class="bg-white border-2 border-dashed border-gray-300 h-24 flex items-center justify-center text-gray-400 rounded-xl shadow-sm">
      <span class="text-sm italic">Espacio para Publicidad / Banner AdSense</span>
    </div>
  </div>

  <main class="container mx-auto p-4 flex-grow">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b-4 border-blue-900 inline-block pb-1">
      Propiedades Destacadas
    </h2>

    <div id="propiedades-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="col-span-full text-center text-gray-500 py-10">
        Cargando propiedades...
      </div>
    </div>

    <div class="mt-16 mb-8">
      <div class="bg-blue-900 rounded-2xl p-6 text-white text-center shadow-xl">
        <h4 class="text-xl font-bold mb-4">¡Síguenos en nuestras Redes Sociales!</h4>
        <div class="flex justify-center gap-4">
          <a href="https://instagram.com/tu_perfil" target="_blank" class="flex items-center gap-2 bg-pink-600 px-6 py-2 rounded-lg font-bold hover:bg-pink-700 transition shadow-md">
            <span>Instagram</span>
          </a>
          <a href="https://facebook.com/tu_perfil" target="_blank" class="flex items-center gap-2 bg-blue-600 px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">
            <span>Facebook</span>
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-gray-800 text-gray-400 py-6 text-center text-sm">
    <p>© 2026 Propiedades Collipulli</p>
  </footer>

  <script>
    const propiedadesContainer = document.getElementById("propiedades-container");

    function getEstadoPropiedad(propiedad) {
      if (propiedad.estado) {
        return String(propiedad.estado).toLowerCase();
      }

      if (typeof propiedad.disponible === "boolean") {
        return propiedad.disponible ? "disponible" : "vendida";
      }

      return "disponible";
    }

    function getEstadoBadge(propiedad) {
      const estado = getEstadoPropiedad(propiedad);

      if (estado === "reservada") {
        return `<span class="text-xs font-bold bg-yellow-500 text-white px-3 py-1 rounded-full shadow-lg">RESERVADA</span>`;
      }

      if (estado === "vendida") {
        return `<span class="text-xs font-bold bg-red-500 text-white px-3 py-1 rounded-full shadow-lg">VENDIDA</span>`;
      }

      return `<span class="text-xs font-bold bg-green-500 text-white px-3 py-1 rounded-full shadow-lg">DISPONIBLE</span>`;
    }

    function copyPropertyLink(url) {
      navigator.clipboard.writeText(url)
        .then(() => alert("Enlace copiado al portapapeles"))
        .catch(() => alert("No se pudo copiar el enlace"));
    }

    function crearCard(propiedad) {
      const imagen = propiedad.imagenUrl && propiedad.imagenUrl !== "AQUÍ_IRÁ_LA_URL_DE_TU_FOTO_EN_S3"
        ? propiedad.imagenUrl
        : "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=600&q=80";

      const whatsappNumero = "56989296908";
      const propertyUrl = `propiedad.html?id=${propiedad.id}`;
      const absolutePropertyUrl = `${window.location.origin}${window.location.pathname.replace('index.html', '')}${propertyUrl}`;
      const shareUrl = encodeURIComponent(absolutePropertyUrl);

      const mensaje = encodeURIComponent(
        `Hola, me interesa la propiedad: ${propiedad.titulo} en ${propiedad.ubicacion}. ${absolutePropertyUrl}`
      );
      const whatsappLink = `https://wa.me/${whatsappNumero}?text=${mensaje}`;

      const whatsappShareText = encodeURIComponent(
        `Mira esta propiedad: ${propiedad.titulo} - ${absolutePropertyUrl}`
      );
      const whatsappShareLink = `https://wa.me/?text=${whatsappShareText}`;

      return `
        <div onclick="window.location='${propertyUrl}'"
             class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-2xl transition duration-300 group cursor-pointer">

          <div class="relative">
            <img src="${imagen}" alt="${propiedad.titulo}" class="w-full h-56 object-cover group-hover:scale-105 transition duration-500">
            <div class="absolute top-3 left-3">
              ${getEstadoBadge(propiedad)}
            </div>
          </div>

          <div class="p-5">
            <h3 class="text-xl font-bold text-blue-900 mb-1">${propiedad.titulo ?? "Sin título"}</h3>
            <p class="text-gray-500 text-sm mb-4">${propiedad.ubicacion ?? "Sin ubicación"}</p>

            <div class="flex justify-between items-center text-gray-700 text-sm mb-4 bg-gray-50 p-2 rounded-lg">
              <span>🛏️ ${propiedad.dormitorios ?? 0} Dorm.</span>
              <span>🚿 ${propiedad.banos ?? 0} Baños</span>
            </div>

            <div class="flex gap-3 mb-4 border-t pt-3 items-center" onclick="event.stopPropagation()">
              <span class="text-xs text-gray-400 self-center mr-1">Compartir:</span>

              <a href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" class="text-blue-600 hover:scale-110 transition-transform" title="Compartir en Facebook">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
              </a>

              <a href="${whatsappShareLink}" target="_blank" class="text-green-600 hover:scale-110 transition-transform" title="Compartir por WhatsApp">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M20.52 3.48A11.86 11.86 0 0 0 12.06 0C5.52 0 .2 5.32.2 11.86c0 2.08.54 4.11 1.58 5.9L0 24l6.4-1.67a11.8 11.8 0 0 0 5.66 1.44h.01c6.54 0 11.86-5.32 11.86-11.86 0-3.17-1.24-6.15-3.41-8.43ZM12.07 21.74h-.01a9.84 9.84 0 0 1-5.01-1.37l-.36-.21-3.8.99 1.01-3.71-.23-.38a9.82 9.82 0 0 1-1.5-5.2c0-5.43 4.42-9.85 9.86-9.85 2.63 0 5.1 1.02 6.96 2.89a9.8 9.8 0 0 1 2.89 6.97c0 5.43-4.42 9.85-9.85 9.85Zm5.4-7.36c-.3-.15-1.77-.87-2.05-.97-.27-.1-.47-.15-.66.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.47-.88-.78-1.48-1.75-1.66-2.05-.17-.3-.02-.46.13-.61.14-.14.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.66-.5h-.57c-.2 0-.52.07-.8.37-.27.3-1.05 1.02-1.05 2.5 0 1.47 1.07 2.9 1.22 3.1.15.2 2.1 3.2 5.08 4.49.71.31 1.27.49 1.7.63.71.23 1.35.2 1.86.12.57-.08 1.77-.72 2.02-1.42.25-.7.25-1.29.17-1.42-.07-.13-.27-.2-.57-.35Z"/>
                </svg>
              </a>

              <button onclick="copyPropertyLink('${absolutePropertyUrl}')" type="button" class="text-pink-600 hover:scale-110 transition-transform" title="Copiar enlace">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M16 1H4a2 2 0 0 0-2 2v12h2V3h12V1Zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H8V7h11v14Z"/>
                </svg>
              </button>
            </div>

            <div class="flex justify-between items-center border-t pt-4" onclick="event.stopPropagation()">
              <span class="text-2xl font-black text-blue-900">${propiedad.precio ?? "Consultar"}</span>
              <a href="${whatsappLink}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-green-600 transition">
                WhatsApp
              </a>
            </div>
          </div>
        </div>
      `;
    }

    async function cargarPropiedades() {
      try {
        const response = await fetch("https://propiedades-collipulli-assets.s3.amazonaws.com/data/propiedades.json?v=" + Date.now());

        if (!response.ok) {
          throw new Error("No se pudo cargar propiedades.json desde S3");
        }

        const propiedades = await response.json();

        if (!Array.isArray(propiedades) || propiedades.length === 0) {
          propiedadesContainer.innerHTML = `
            <div class="col-span-full text-center text-gray-500 py-10">
              No hay propiedades publicadas todavía.
            </div>
          `;
          return;
        }

        propiedadesContainer.innerHTML = propiedades.map(crearCard).join("");
      } catch (error) {
        console.error("Error cargando propiedades:", error);
        propiedadesContainer.innerHTML = `
          <div class="col-span-full text-center text-red-500 py-10">
            Error al cargar propiedades.
          </div>
        `;
      }
    }

    cargarPropiedades();
  </script>
</body>
</html>
