<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Propiedades Collipulli</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Panel Admin</h2>
            <p class="text-gray-500 text-sm">Ingresa tus credenciales</p>
        </div>
        
        <form action="#" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Usuario o Correo</label>
                <input type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="admin@collipulli.cl">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label>
                <input type="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition duration-300">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="index.html" class="text-sm text-blue-600 hover:underline">← Volver a la página principal</a>
        </div>
    </div>

</body>
</html>
