<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Propiedades Collipulli</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-blue-900">Propiedades Collipulli</h2>
            <p class="text-gray-500 text-sm mt-2">Acceso Administrativo</p>
        </div>
        <form class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Usuario</label>
                <input type="text" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ingresa tu usuario">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Contraseña</label>
                <input type="password" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
            </div>
            <button type="button" class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition shadow-lg">Entrar al Panel</button>
        </form>
        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-blue-600 hover:underline">← Volver al sitio principal</a>
        </div>
    </div>
</body>
</html>
