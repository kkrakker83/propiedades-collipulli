<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle de Propiedad | Propiedades Collipulli</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

  <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center">
      <a href="./index.html" class="text-xl font-bold tracking-tight">Propiedades Collipulli</a>
      <a href="./index.html" class="text-sm bg-blue-700 px-4 py-2 rounded-lg hover:bg-blue-600 transition font-semibold">
        Volver al listado
      </a>
    </div>
  </nav>

  <main class="container mx-auto p-4 flex-grow">
    <div id="property-detail" class="max-w-6xl mx-auto">
      <div class="text-center text-gray-500 py-12">Cargando propiedad...</div>
    </div>
  </main>

  <footer class="bg-gray-800 text-gray-400 py-6 text-center text-sm">
    <p>© 2026 Propiedades Collipulli</p>
  </footer>

  <script>
    const propertyDetail = document.getElementById("property-detail");
    const whatsappNumero = "56951051271";
    const fallbackImage = "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1200&q=80";

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function formatDescription(texto) {
      if (!texto || !texto.trim()) {
        return "Propiedad disponible para mayor información vía WhatsApp.";
      }
      return texto.replace(/\n/g, "<br>");
    }

    function getMainImage(propiedad) {
      if (propiedad.imagenUrl && propiedad.imagenUrl !== "AQUÍ_IRÁ_LA_URL_DE_TU_FOTO_EN_S3") {
        return propiedad.imagenUrl;
      }

      if (Array.isArray(propiedad.galeria) && propiedad.galeria.length > 0) {
        return propiedad.galeria[0];
      }

      return fallbackImage;
    }

    function renderGallery(propiedad) {
      const imagenPrincipal = getMainImage(propiedad);

      const galeria = Array.isArray(propiedad.galeria) && propiedad.galeria.length > 0
        ? propiedad.galeria
        : [imagenPrincipal];

      return `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div class="lg:col-span-2">
            <img
              id="main-image"
              src="${imagenPrincipal}"
              alt="${propiedad.titulo || "Propiedad"}"
              class="w-full h-[420px] object-cover rounded-2xl shadow-md bg-white"
            />
          </div>

          <div class="grid grid-cols-2 lg:grid-cols-1 gap-4">
            ${galeria.slice(0, 6).map((url, index) => `
              <button
                type="button"
                onclick="changeMainImage('${url}')"
                class="bg-white rounded-2xl shadow-md overflow-hidden border hover:scale-[1.01] transition"
              >
                <img
                  src="${url}"
                  alt="Imagen ${index + 1}"
                  class="w-full h-32 object-cover"
                />
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderVideos(propiedad) {
      if (!Array.isArray(propiedad.videos) || propiedad.videos.length === 0) {
        return "";
      }

      return `
        <div class="border-t pt-6 mt-6">
          <h2 class="text-2xl font-bold text-gray-800 mb-4">Videos</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${propiedad.videos.map((videoUrl, index) => `
              <div class="bg-black rounded-2xl overflow-hidden shadow-md">
                <video controls class="w-full h-72 bg-black">
                  <source src="${videoUrl}" type="video/mp4">
                  Tu navegador no soporta la reproducción de video.
                </video>
                <div class="p-3 bg-white text-sm text-gray-600">
                  Video ${index + 1}
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function changeMainImage(url) {
      const mainImage = document.getElementById("main-image");
      if (mainImage) {
        mainImage.src = url;
      }
    }

    function renderProperty(propiedad) {
      const disponible = propiedad.disponible
        ? `<span class="inline-block text-sm font-bold bg-green-500 text-white px-4 py-2 rounded-full shadow">DISPONIBLE</span>`
        : `<span class="inline-block text-sm font-bold bg-red-500 text-white px-4 py-2 rounded-full shadow">NO DISPONIBLE</span>`;

      const mensaje = encodeURIComponent(
        `Hola, me interesa la propiedad "${propiedad.titulo || "Sin título"}" ubicada en ${propiedad.ubicacion || "sin ubicación indicada"}.`
      );
      const whatsappLink = `https://wa.me/${whatsappNumero}?text=${mensaje}`;

      document.title = `${propiedad.titulo || "Detalle de Propiedad"} | Propiedades Collipulli`;

      propertyDetail.innerHTML = `
        <div class="bg-white rounded-3xl shadow-xl p-4 md:p-8">
          <div class="mb-6">
            ${renderGallery(propiedad)}
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
              <div class="mb-4">${disponible}</div>

              <h1 class="text-3xl md:text-4xl font-black text-blue-900 mb-2">
                ${propiedad.titulo || "Sin título"}
              </h1>

              <p class="text-gray-500 text-lg mb-4">
                ${propiedad.ubicacion || "Ubicación no informada"}
              </p>

              <div class="flex flex-wrap gap-3 mb-6">
                <div class="bg-gray-100 px-4 py-3 rounded-xl font-semibold text-gray-700">
                  🛏️ ${propiedad.dormitorios || 0} Dormitorios
                </div>
                <div class="bg-gray-100 px-4 py-3 rounded-xl font-semibold text-gray-700">
                  🚿 ${propiedad.banos || 0} Baños
                </div>
              </div>

              <div class="border-t pt-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-3">Descripción</h2>
                <p class="text-gray-700 leading-7">
                  ${formatDescription(propiedad.descripcion || "")}
                </p>
              </div>

              ${renderVideos(propiedad)}
            </div>

            <div>
              <div class="bg-gray-50 rounded-2xl p-6 shadow-sm border sticky top-24">
                <p class="text-sm text-gray-500 mb-2">Precio</p>
                <p class="text-3xl font-black text-blue-900 mb-6">
                  ${propiedad.precio || "Consultar"}
                </p>

                <a
                  href="${whatsappLink}"
                  target="_blank"
                  class="block w-full text-center bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600 transition shadow-md mb-3"
                >
                  Consultar por WhatsApp
                </a>

                <a
                  href="./index.html"
                  class="block w-full text-center bg-blue-900 text-white py-4 rounded-xl font-bold hover:bg-blue-800 transition"
                >
                  Volver al listado
                </a>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function loadProperty() {
      try {
        const propertyId = getQueryParam("id");

        if (!propertyId) {
          propertyDetail.innerHTML = `
            <div class="text-center text-red-500 py-12">
              No se indicó el ID de la propiedad.
            </div>
          `;
          return;
        }

        const response = await fetch("./propiedades.json?v=" + Date.now());

        if (!response.ok) {
          throw new Error("No se pudo cargar propiedades.json");
        }

        const propiedades = await response.json();
        const propiedad = propiedades.find(item => String(item.id) === String(propertyId));

        if (!propiedad) {
          propertyDetail.innerHTML = `
            <div class="text-center text-red-500 py-12">
              No se encontró la propiedad solicitada.
            </div>
          `;
          return;
        }

        renderProperty(propiedad);
      } catch (error) {
        console.error(error);
        propertyDetail.innerHTML = `
          <div class="text-center text-red-500 py-12">
            Error al cargar la propiedad.
          </div>
        `;
      }
    }

    loadProperty();
  </script>
</body>
</html>
