<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin - Propiedades Collipulli</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1226.0/aws-sdk.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
  <div class="max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
    <h1 class="text-2xl md:text-3xl font-bold mb-6 text-blue-900 text-center">
      Panel de Administración - Propiedades Collipulli
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div>
        <label for="titulo" class="block text-gray-700 font-semibold mb-2">Título</label>
        <input
          type="text"
          id="titulo"
          placeholder="Ej: Parcela con casa en Collipulli"
          class="block w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <div>
        <label for="precio" class="block text-gray-700 font-semibold mb-2">Precio</label>
        <input
          type="text"
          id="precio"
          placeholder="Ej: $85.000.000"
          class="block w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>
    </div>

    <div class="mb-4">
      <label for="ubicacion" class="block text-gray-700 font-semibold mb-2">Ubicación</label>
      <input
        type="text"
        id="ubicacion"
        placeholder="Ej: Collipulli, Región de La Araucanía"
        class="block w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>

    <div class="mb-6">
      <label for="file-upload" class="block text-gray-700 font-semibold mb-2">
        Fotos y videos
      </label>
      <input
        type="file"
        id="file-upload"
        multiple
        accept="image/*,video/*"
        class="block w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"
      />
      <p class="text-sm text-gray-500 mt-2">
        Puedes seleccionar múltiples fotos y videos al mismo tiempo. La primera imagen será usada como portada si existe.
      </p>
    </div>

    <div class="flex flex-col md:flex-row gap-3 mb-4">
      <button
        id="upload-btn"
        onclick="uploadFiles()"
        class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 w-full font-bold transition-all shadow-lg active:scale-95"
      >
        Subir propiedad a S3
      </button>

      <button
        onclick="clearCredentials()"
        class="bg-gray-200 text-gray-800 px-6 py-3 rounded-lg hover:bg-gray-300 w-full font-bold transition-all"
      >
        Cambiar llaves AWS
      </button>
    </div>

    <div class="mb-4">
      <p id="status" class="text-sm font-medium min-h-[24px]"></p>
      <div class="w-full bg-gray-200 rounded-full h-4 mt-3 overflow-hidden">
        <div
          id="progress-bar"
          class="bg-blue-600 h-4 rounded-full text-xs text-white text-center leading-4"
          style="width: 0%;"
        >
          0%
        </div>
      </div>
    </div>

    <div class="mb-4">
      <h2 class="text-lg font-bold text-gray-800 mb-2">Vista previa de archivos seleccionados</h2>
      <div id="preview" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
    </div>

    <hr class="my-6 border-gray-200" />

    <div>
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-lg font-bold text-gray-800">JSON generado para propiedades.json</h2>
        <button
          onclick="copyJson()"
          class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 font-semibold"
        >
          Copiar JSON
        </button>
      </div>

      <textarea
        id="json-output"
        rows="14"
        class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 font-mono text-sm outline-none focus:ring-2 focus:ring-green-500"
        placeholder="Aquí aparecerá el JSON generado..."
      ></textarea>
    </div>
  </div>

  <script src="upload.js"></script>
</body>
</html>
